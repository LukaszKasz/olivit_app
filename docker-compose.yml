services:
  db:
    image: postgres:15-alpine
    container_name: advox-oms-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: advox_oms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - advox-oms-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: advox-oms-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/advox_oms_db
      SECRET_KEY: your-secret-key-change-in-production-please
      WOOCOMMERCE_URL: "https://host.docker.internal:8888/wp-json/wc/v3"
      WOOCOMMERCE_CONSUMER_KEY: "ck_8b51b5cd1a0a3b96f752a4b0cba276b37b6025ee"
      WOOCOMMERCE_CONSUMER_SECRET: "cs_5ad0b8fdedfc37cc75eb839c0b68b561cd675943"
      WOOCOMMERCE_VERIFY_SSL: "false"
      MAGENTO_URL: "https://host.docker.internal:8444/rest"
      MAGENTO_CONSUMER_KEY: "kqe3wuqss6fhu90pww8dxy8a2r33y2gk"
      MAGENTO_CONSUMER_SECRET: "0pa9iainsnhmfzsj8rslxk6l1r055b7e"
      MAGENTO_ACCESS_TOKEN: "qs5kl1q6w9ft51n697tt95a6gxi43jln"
      MAGENTO_ACCESS_TOKEN_SECRET: "hshzfykkiez33rht1v0t7wf0cfznpz4e"
      MAGENTO_VERIFY_SSL: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - advox-oms-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: advox-oms-frontend
    ports:
      - "3300:80"
    depends_on:
      - backend
    networks:
      - advox-oms-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  advox-oms-network:
    driver: bridge
