name: olivi_app

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-olivi_app_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-olivi_app_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - olivi-app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/olivi_app_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      PRESTASHOP_URL: ${PRESTASHOP_URL:-}
      PRESTASHOP_API_KEY: ${PRESTASHOP_API_KEY:-}
      BASELINKER_URL: ${BASELINKER_URL:-https://api.baselinker.com/connector.php}
      BASELINKER_API_KEY: ${BASELINKER_API_KEY:-}
      WOOCOMMERCE_URL: ${WOOCOMMERCE_URL:-}
      WOOCOMMERCE_CONSUMER_KEY: ${WOOCOMMERCE_CONSUMER_KEY:-}
      WOOCOMMERCE_CONSUMER_SECRET: ${WOOCOMMERCE_CONSUMER_SECRET:-}
      WOOCOMMERCE_VERIFY_SSL: ${WOOCOMMERCE_VERIFY_SSL:-true}
      SHOPIFY_URL: ${SHOPIFY_URL:-}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN:-}
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:-}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:-}
      SHOPIFY_VERIFY_SSL: ${SHOPIFY_VERIFY_SSL:-true}
      MAGENTO_URL: ${MAGENTO_URL:-}
      MAGENTO_CONSUMER_KEY: ${MAGENTO_CONSUMER_KEY:-}
      MAGENTO_CONSUMER_SECRET: ${MAGENTO_CONSUMER_SECRET:-}
      MAGENTO_ACCESS_TOKEN: ${MAGENTO_ACCESS_TOKEN:-}
      MAGENTO_ACCESS_TOKEN_SECRET: ${MAGENTO_ACCESS_TOKEN_SECRET:-}
      MAGENTO_VERIFY_SSL: ${MAGENTO_VERIFY_SSL:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      olivi-app-network:
      proxy:
        aliases:
          - olivitqms-backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    ports:
      - "3300:80"
    depends_on:
      - backend
    networks:
      olivi-app-network:
      proxy:
        aliases:
          - olivitqms-frontend
    restart: unless-stopped

volumes:
  postgres_data:
    name: olivi_app_postgres_data
    driver: local

networks:
  olivi-app-network:
    name: olivi_app_network
    driver: bridge

  proxy:
    external: true
